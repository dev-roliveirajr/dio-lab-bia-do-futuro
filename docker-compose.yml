services:

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-service
    ports:
      - "${OLLAMA_SERVICE_PORT}:${OLLAMA_SERVICE_PORT}"
    mem_limit: ${OLLAMA_MEMORY_LIMIT}
    gpus: ${DOCKER_USE_GPU}
    environment:
      - OLLAMA_HOST=0.0.0.0:${OLLAMA_SERVICE_PORT}
      - OLLAMA_MODEL_NAME=${OLLAMA_MODEL_NAME}
      - OLLAMA_NUM_THREADS=${OLLAMA_NUM_THREADS}
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH}
      - OLLAMA_BATCH_SIZE=${OLLAMA_BATCH_SIZE}
      - GGML_CUDA_FORCE_MMQ=${GGML_CUDA_FORCE_MMQ}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE}
    volumes:
      - ollama-data:/root/.ollama
      - ./start-ollama.sh:/start-ollama.sh
    entrypoint: ["/bin/bash", "/start-ollama.sh"]
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama run $OLLAMA_MODEL_NAME \"ping\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luma-agent-app
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - OLLAMA_SERVICE_URL=${OLLAMA_SERVICE_HOST}:${OLLAMA_SERVICE_PORT}
    volumes:
        - ./src:/app/src
        - ./data:/app/data
    working_dir: /app
    command: streamlit run src/app.py --server.port ${APP_PORT} --server.address 0.0.0.0
    restart: unless-stopped

volumes:
  ollama-data: